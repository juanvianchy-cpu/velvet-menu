<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Menu</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>
    <h1>VELVET</h1>
    <p>Sweet Moments</p>
</header>

<div class="container">

    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Buscar productos...">
    </div>

    <div class="categories">
        <button> Postres</button>
        <button> Bebidas Frías</button>
        <button> Bebidas Calientes</button>
        <button> Tortas y Pasteles</button>
    </div>

    <h2 class="section-title">Postres</h2>

    <div class="product-card">

        <div class="product-info">
            <h3>Cheesecake</h3>

            <p>
                Delicioso cheesecake artesanal con
                frutos rojos y base de galleta.
            </p>

            <span>$18.000</span>
        </div>

        <img src="">
    </div>

    <div class="product-card">

        <div class="product-info">
            <h3>Brownie</h3>

            <p>
                Brownie de chocolate oscuro con
                topping de helado de vainilla.
            </p>

            <span>$14.000</span>
        </div>

        <img src="">
    </div>

</div>

</body>
</html>
